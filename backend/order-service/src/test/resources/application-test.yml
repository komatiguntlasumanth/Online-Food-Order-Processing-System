spring:
  datasource:
    url: jdbc:h2:mem:order_test_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  jms:
    activemq:
      broker-url: vm://localhost?broker.persistent=false
camunda:
  bpm:
    database:
      schema-update: true
    job-execution:
      enabled: false
