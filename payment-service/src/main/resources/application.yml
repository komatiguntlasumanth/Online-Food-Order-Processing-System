server:
  port: 8081

spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:h2:mem:paymentdb;DB_CLOSE_DELAY=-1
    username: sa
    password: ''
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
