version: "3.9"

services:

  # ─────────────────────────────────────────
  # MySQL Database
  # ─────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: mysql-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Apache ActiveMQ (JMS broker)
  # ─────────────────────────────────────────
  activemq:
    image: apache/activemq-classic:5.18.4
    container_name: activemq
    ports:
      - "61616:61616"   # JMS / TCP
      - "8161:8161"     # Web console  →  http://localhost:8161  (admin/admin)
    environment:
      ACTIVEMQ_ADMIN_LOGIN: admin
      ACTIVEMQ_ADMIN_PASSWORD: admin
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8161 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────
  # Order Service  (port 8080)
  # Camunda cockpit → http://localhost:8080/camunda
  # ─────────────────────────────────────────
  order-service:
    build:
      context: ./backend
      dockerfile: order-service/Dockerfile
    container_name: order-service
    ports:
      - "8080:8080"
    environment:
      SPRING_JMS_ACTIVEMQ_BROKER_URL: tcp://activemq:61616
      SPRING_JMS_ACTIVEMQ_USER: admin
      SPRING_JMS_ACTIVEMQ_PASSWORD: admin
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/order_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      activemq:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: on-failure

  # ─────────────────────────────────────────
  # Payment Service  (port 8081)
  # ─────────────────────────────────────────
  payment-service:
    build:
      context: ./backend
      dockerfile: payment-service/Dockerfile
    container_name: payment-service
    ports:
      - "8081:8081"
    environment:
      SPRING_JMS_ACTIVEMQ_BROKER_URL: tcp://activemq:61616
      SPRING_JMS_ACTIVEMQ_USER: admin
      SPRING_JMS_ACTIVEMQ_PASSWORD: admin
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/payment_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      activemq:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: on-failure

  # ─────────────────────────────────────────
  # Kitchen Service  (port 8082)
  # ─────────────────────────────────────────
  kitchen-service:
    build:
      context: ./backend
      dockerfile: kitchen-service/Dockerfile
    container_name: kitchen-service
    ports:
      - "8082:8082"
    environment:
      SPRING_JMS_ACTIVEMQ_BROKER_URL: tcp://activemq:61616
      SPRING_JMS_ACTIVEMQ_USER: admin
      SPRING_JMS_ACTIVEMQ_PASSWORD: admin
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/kitchen_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      activemq:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: on-failure

  # ─────────────────────────────────────────
  # Delivery Service  (port 8083)
  # ─────────────────────────────────────────
  delivery-service:
    build:
      context: ./backend
      dockerfile: delivery-service/Dockerfile
    container_name: delivery-service
    ports:
      - "8083:8083"
    environment:
      SPRING_JMS_ACTIVEMQ_BROKER_URL: tcp://activemq:61616
      SPRING_JMS_ACTIVEMQ_USER: admin
      SPRING_JMS_ACTIVEMQ_PASSWORD: admin
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/delivery_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      activemq:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: on-failure

  # ─────────────────────────────────────────
  # React/Vite UI served by nginx  (port 3000)
  # ─────────────────────────────────────────
  food-delivery-ui:
    build:
      context: ./frontend/food-delivery-ui
      dockerfile: Dockerfile
    container_name: food-delivery-ui
    ports:
      - "3000:80"
    depends_on:
      - order-service
    restart: on-failure
