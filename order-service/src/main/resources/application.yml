server:
  port: 8080

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:h2:mem:orderdb;DB_CLOSE_DELAY=-1
    username: sa
    password: ''
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  jms:
    template:
      default-destination: order.created
    activemq:
      broker-url: tcp://localhost:61616
      user: admin
      password: admin

camunda:
  bpm:
    database:
      schema-update: true
    job-execution:
      enabled: true
      active: true
    webapp:
      index-redirect: true

jwt:
  secret: SwiggyExpressSecretKey2024_VeryLongSecureKey_AtLeast256Bits!!
  expiration: 86400000

logging:
  level:
    org.camunda.bpm.engine: INFO
    org.springframework.jms: INFO
    org.springframework.security: INFO
